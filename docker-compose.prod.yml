services:
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: yii-prod-php
    environment:
      - YII_ENV=prod
      - YII_DEBUG=false
      # Для реального продакшена используйте Docker secrets или переменные окружения хост-машины
      - DB_DSN=mysql:host=db;dbname=yii_app
      - DB_USERNAME=yii_user
      - DB_PASSWORD=yii_password
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - assets:/app/web/assets
      - runtime:/app/runtime
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: yii-prod-nginx
    ports:
      - "80:80"
    volumes:
      - ./app/web:/app/web:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - assets:/app/web/assets
    depends_on:
      - php
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: yii-prod-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: yii_app
      MYSQL_USER: yii_user
      MYSQL_PASSWORD: yii_password # Обязательно измените на надежный пароль
      MYSQL_ROOT_PASSWORD: root_password # Обязательно измените на надежный пароль
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data:
  assets:
  runtime: