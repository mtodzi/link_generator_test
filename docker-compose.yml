# docker-compose.yml

services:
  # Веб-сервер Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: yii2-nginx
    ports:
      - "8182:80" # Пробрасываем порт 8080 хоста на 80 контейнера
    volumes:
      - ./app:/app # Синхронизация кода приложения
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf # Конфиг Nginx
    depends_on:
      - php
    networks:
      - yii2-network

  # PHP-FPM
  php:
    build:
      context: ./docker/php # Путь к Dockerfile для PHP
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: yii2-php
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./app:/app # Синхронизация кода приложения
    depends_on:
      - db
    networks:
      - yii2-network

  # База данных MySQL
  db:
    image: mysql:8.0
    container_name: yii2-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'root_password'
      MYSQL_DATABASE: 'yii2_db'
      MYSQL_USER: 'yii2_user'
      MYSQL_PASSWORD: 'yii2_password'
    ports:
      - "33066:3306" # Пробрасываем порт 33066 хоста на 3306 контейнера
    volumes:
      - db-data:/var/lib/mysql # Сохранение данных БД между перезапусками
    networks:
      - yii2-network

# Сеть для взаимодействия контейнеров
networks:
  yii2-network:
    driver: bridge

# Том для персистентного хранения данных БД
volumes:
  db-data:
